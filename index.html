<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Pomodoro Timer with custom durations, task management, and offline support.">
    <meta name="theme-color" content="#e74c3c">
    <title>Pomodoro Timer Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="work-mode">
    <main id="app" role="main">
        <!-- Timer Display -->
        <section id="state-indicator" aria-live="polite" aria-atomic="true">
            <h2 id="current-phase">Work Session</h2>
        </section>

        <section id="timer-display">
            <time id="time-left" aria-live="assertive" aria-atomic="true">25:00</time>
        </section>

        <!-- Core Controls -->
        <section id="controls">
            <button id="start-btn" type="button" aria-label="Start Timer">Start</button>
            <button id="pause-btn" type="button" aria-label="Pause Timer" hidden>Pause</button>
            <button id="reset-btn" type="button" aria-label="Reset Timer">Reset</button>
        </section>

        <!-- Settings (Phase 2) -->
        <details id="settings">
            <summary>Timer Settings</summary>
            <div class="settings-grid">
                <label>
                    Work (min)
                    <input type="number" id="work-input" value="25" min="1" max="60">
                </label>
                <label>
                    Break (min)
                    <input type="number" id="break-input" value="5" min="1" max="30">
                </label>
            </div>
        </details>

        <!-- Task Management (Phase 2) -->
        <section id="task-management">
            <h3>Tasks</h3>
            <form id="task-form">
                <input type="text" id="task-input" placeholder="What are you working on?" required maxlength="50" aria-label="New task name">
                <button type="submit">Add</button>
            </form>
            <ul id="task-list" aria-live="polite">
                <!-- Tasks injected by app.js -->
            </ul>
        </section>

        <!-- Session Tracking -->
        <section id="session-tracking">
            <p>Completed Sessions: <span id="session-count">0</span></p>
            <button id="clear-progress-btn" type="button" title="Clear all sessions and tasks">
                Reset All Progress
            </button>
        </section>
    </main>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log("PWA: Service Worker Active"))
                    .catch(err => console.warn("PWA: Registration Failed", err));
            });
        }
    </script>

    <!-- Application Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
