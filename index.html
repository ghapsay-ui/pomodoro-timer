<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A production-ready Pomodoro Timer built with Vanilla JS and Zustand.">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="work-mode">
    <main id="app" role="main">
        <!-- State Indicator: Visual and Screen-Reader distinction between Work/Break -->
        <section id="state-indicator" aria-live="polite" aria-atomic="true">
            <h2 id="current-phase">Work Session</h2>
        </section>

        <!-- Timer Display: MM:SS format -->
        <section id="timer-display">
            <time id="time-left" aria-live="assertive" aria-atomic="true">25:00</time>
        </section>

        <!-- User Controls: Start, Pause, Reset -->
        <section id="controls">
            <button id="start-btn" type="button" aria-label="Start Timer">Start</button>
            <button id="pause-btn" type="button" aria-label="Pause Timer" hidden>Pause</button>
            <button id="reset-btn" type="button" aria-label="Reset Timer">Reset</button>
        </section>

        <!-- Session Tracking: Persistent counter -->
        <section id="session-tracking">
            <p>Completed Sessions: <span id="session-count">0</span></p>
            <button id="clear-progress-btn" type="button" title="Clear all saved progress">
                Reset All Progress
            </button>
        </section>
    </main>

    <!-- Production Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
